<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>世界の時計</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar text-bg-danger fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img src="images/logo.png" alt="Logo" class="logo-main"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">メニュー</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">ホーム</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">サービス</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                    会社概要
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">Action</a></li>
                                    <li><a class="dropdown-item" href="#">Another action</a></li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li><a class="dropdown-item" href="#">Something else here</a></li>
                                </ul>
                            </li>
                        </ul>
                        <form class="d-flex mt-3" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                            <button class="btn btn-outline-success" type="submit">検索</button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section id="items">
            <div class="container pt-5 mt-5">
                <div class="row">
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_01.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_02.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_03.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_04.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_05.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_06.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_07.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-4 col-md-3 g-3">
                        <img src="images/item_08.jpg" alt="" class="rounded-circle img-fluid">
                    </div>
                </div>
            </div>
        </section>
        <section id="hero">
            <div class="container">
                <div class="bg-body-secondary p-5  mt-5 rounded">
                    <h1>時計の世界オンライン</h1>
                    <p>
                        ユーザ登録とは、無料でお客様の情報を登録いただける機能です。
                        お気に入り登録した時計情報をいつでも閲覧できます。
                    </p>
                    <!-- モーダルボタン -->
                    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal">
                        ユーザ登録する
                    </button>

                    <!-- モーダルウィンドウの中身 -->
                    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                        aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5" id="exampleModalLabel">ユーザ登録画面</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    メールアドレスをご登録ください。
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">キャンセル</button>
                                    <button type="button" class="btn btn-danger">登録する</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <div class="text-bg-danger text-center mt-5 p-5">
            <div class="py-5"><img src="images/logo.png" alt="Logo"></div>
            <p><small>時計の世界 &copy; 2024</small></p>
        </div>
